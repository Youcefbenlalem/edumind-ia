<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUMIND IA — Se connecter</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --emerald: #00c9a7; --emerald-dark: #008f76;
      --navy: #0a0e1a; --navy-mid: #111827; --navy-light: #1a2340;
      --gold: #f5c842; --white: #f0f4ff; --muted: #8896b3;
      --red: #ff5f6d; --card-bg: rgba(26,35,64,0.85);
    }
    body {
      font-family: 'Syne', 'Tajawal', sans-serif;
      background: var(--navy); color: var(--white);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; overflow-x: hidden;
    }
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 30% 50%, rgba(0,201,167,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 50% at 80% 20%, rgba(245,200,66,0.06) 0%, transparent 60%), var(--navy);
    }
    .card {
      position: relative; z-index: 1;
      background: var(--card-bg);
      border: 1px solid rgba(0,201,167,0.15);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 460px;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      position: absolute; top: -3.5rem; left: 0;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--emerald); }
    .logo {
      text-align: center; margin-bottom: 2rem;
    }
    .logo-icon {
      width: 60px; height: 60px; margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--emerald), var(--gold));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 10px 30px rgba(0,201,167,0.3);
    }
    .card-title-fr {
      font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem;
      background: linear-gradient(90deg, var(--white), var(--emerald));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-title-ar {
      font-family: 'Tajawal'; direction: rtl;
      font-size: 1.2rem; color: var(--muted); margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.4rem; }
    .form-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 0.6rem; text-transform: uppercase;
    }
    .label-ar { font-family: 'Tajawal'; font-size: 0.85rem; text-transform: none; letter-spacing: 0; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.9rem 1.2rem;
      color: var(--white);
      font-family: 'Syne'; font-size: 0.95rem;
      outline: none; transition: all 0.3s;
    }
    .form-input:focus {
      border-color: var(--emerald);
      background: rgba(0,201,167,0.05);
      box-shadow: 0 0 0 4px rgba(0,201,167,0.1);
    }
    .form-input::placeholder { color: rgba(136,150,179,0.5); }
    .forgot { font-size: 0.78rem; color: var(--emerald); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }
    .btn-submit {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
      border: none; border-radius: 14px;
      color: white; cursor: pointer;
      font-family: 'Tajawal', 'Syne'; font-size: 1.1rem; font-weight: 700;
      margin-top: 0.5rem;
      transition: all 0.3s;
      box-shadow: 0 6px 25px rgba(0,201,167,0.3);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,201,167,0.4); }
    .btn-submit:active { transform: translateY(0); }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0; color: rgba(136,150,179,0.4); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.06);
    }
    .signup-link {
      text-align: center; font-size: 0.9rem; color: var(--muted);
    }
    .signup-link a { color: var(--emerald); text-decoration: none; font-weight: 700; }
    .signup-link a:hover { text-decoration: underline; }
    .error-msg {
      background: rgba(255,95,109,0.1); border: 1px solid rgba(255,95,109,0.3);
      border-radius: 10px; padding: 0.8rem 1rem;
      color: var(--red); font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .success-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(10,14,26,0.95);
      align-items: center; justify-content: center;
      flex-direction: column; text-align: center;
    }
    .success-overlay.show { display: flex; }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; animation: bounce 0.5s ease; }
    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  </style>
</head>
<body>
  <div class="bg-canvas"></div>

  <div class="card">
    <a href="../index.html" class="back-btn">← Retour · العودة</a>

    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div class="card-title-fr">Se connecter</div>
      <div class="card-title-ar">تسجيل الدخول</div>
    </div>

    <div class="error-msg" id="errorMsg">Email ou mot de passe incorrect · البريد أو كلمة المرور غير صحيحة</div>

    <form id="signinForm" onsubmit="handleSignin(event)">
      <div class="form-group">
        <label class="form-label">
          <span>Email</span>
          <span class="label-ar">البريد الإلكتروني</span>
        </label>
        <input type="email" class="form-input" placeholder="ton@email.com" id="email" required />
      </div>

      <div class="form-group">
        <label class="form-label">
          <span>Mot de passe · <span class="label-ar">كلمة المرور</span></span>
          <a href="#" class="forgot">Oublié ?</a>
        </label>
        <input type="password" class="form-input" placeholder="••••••••" id="password" required />
      </div>

      <button type="submit" class="btn-submit">
        Se connecter · تسجيل الدخول
      </button>
    </form>

    <div class="divider">ou · أو</div>

    <div class="signup-link">
      Pas encore de compte ? <a href="signup.html">S'inscrire · إنشاء حساب</a>
    </div>
  </div>

  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">🎉</div>
    <h2 style="font-size:1.8rem;margin-bottom:0.5rem;">Connexion réussie !</h2>
    <p style="font-family:'Tajawal';font-size:1.2rem;color:var(--emerald);">تم تسجيل الدخول بنجاح</p>
    <p style="color:var(--muted);margin-top:0.5rem;">Redirection en cours...</p>
  </div>

  <script>
    async function handleSignin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          document.getElementById('successOverlay').classList.add('show');
          setTimeout(() => window.location.href = 'dashboard.html', 1800);
        } else {
          errorMsg.style.display = 'block';
          errorMsg.textContent = data.message || 'Email ou mot de passe incorrect · البريد أو كلمة المرور غير صحيحة';
        }
      } catch {
        // Demo mode - redirect anyway
        document.getElementById('successOverlay').classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 1800);
      }
    }
  </script>
</body>
</html>
