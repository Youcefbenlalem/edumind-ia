<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDUMIND IA — S'inscrire</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --emerald: #00c9a7; --emerald-dark: #008f76;
      --navy: #0a0e1a; --navy-light: #1a2340;
      --gold: #f5c842; --white: #f0f4ff; --muted: #8896b3;
      --red: #ff5f6d;
    }
    body {
      font-family: 'Syne', 'Tajawal', sans-serif;
      background: var(--navy); color: var(--white);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 70% 50%, rgba(0,201,167,0.1) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 20% 80%, rgba(245,200,66,0.07) 0%, transparent 60%), var(--navy);
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(26,35,64,0.85);
      border: 1px solid rgba(0,201,167,0.15);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 500px;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .back-btn {
      position: absolute; top: -3.5rem; left: 0;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--emerald); }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 60px; height: 60px; margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--gold), var(--emerald));
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; box-shadow: 0 10px 30px rgba(245,200,66,0.2);
    }
    .card-title-fr {
      font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem;
      background: linear-gradient(90deg, var(--white), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-title-ar {
      font-family: 'Tajawal'; direction: rtl;
      font-size: 1.2rem; color: var(--muted); margin-bottom: 2rem;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase;
    }
    .label-ar { font-family: 'Tajawal'; font-size: 0.85rem; text-transform: none; letter-spacing: 0; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      color: var(--white);
      font-family: 'Syne'; font-size: 0.9rem;
      outline: none; transition: all 0.3s;
    }
    .form-input:focus {
      border-color: var(--gold);
      background: rgba(245,200,66,0.04);
      box-shadow: 0 0 0 4px rgba(245,200,66,0.1);
    }
    .form-input::placeholder { color: rgba(136,150,179,0.5); }
    .strength-bar {
      height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.08);
      margin-top: 0.5rem; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      width: 0%; transition: all 0.3s;
      background: var(--red);
    }
    .terms {
      display: flex; align-items: flex-start; gap: 0.8rem;
      margin: 1rem 0; font-size: 0.82rem; color: var(--muted);
    }
    .terms input[type=checkbox] { margin-top: 3px; accent-color: var(--emerald); }
    .terms a { color: var(--emerald); }
    .btn-submit {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--gold), #e6a800);
      border: none; border-radius: 14px;
      color: var(--navy); cursor: pointer;
      font-family: 'Tajawal', 'Syne'; font-size: 1.1rem; font-weight: 800;
      transition: all 0.3s;
      box-shadow: 0 6px 25px rgba(245,200,66,0.3);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(245,200,66,0.4); }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.3rem 0; color: rgba(136,150,179,0.4); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
    }
    .signin-link { text-align: center; font-size: 0.9rem; color: var(--muted); }
    .signin-link a { color: var(--emerald); text-decoration: none; font-weight: 700; }
    .error-msg {
      background: rgba(255,95,109,0.1); border: 1px solid rgba(255,95,109,0.3);
      border-radius: 10px; padding: 0.8rem 1rem;
      color: var(--red); font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .success-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(10,14,26,0.97);
      align-items: center; justify-content: center;
      flex-direction: column; text-align: center;
    }
    .success-overlay.show { display: flex; }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; animation: bounce 0.5s ease; }
    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    @media(max-width:480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="bg-canvas"></div>

  <div class="card">
    <a href="../index.html" class="back-btn">← Retour · العودة</a>

    <div class="logo">
      <div class="logo-icon">✨</div>
      <div class="card-title-fr">Créer un compte</div>
      <div class="card-title-ar">إنشاء حساب جديد</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">
            <span>Prénom</span>
            <span class="label-ar">الاسم</span>
          </label>
          <input type="text" class="form-input" placeholder="Mohamed" id="firstName" required />
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">
            <span>Nom</span>
            <span class="label-ar">اللقب</span>
          </label>
          <input type="text" class="form-input" placeholder="Benali" id="lastName" required />
        </div>
      </div>

      <div class="form-group" style="margin-top:1.2rem;">
        <label class="form-label">
          <span>Email</span>
          <span class="label-ar">البريد الإلكتروني</span>
        </label>
        <input type="email" class="form-input" placeholder="ton@email.com" id="email" required />
      </div>

      <div class="form-group">
        <label class="form-label">
          <span>Mot de passe</span>
          <span class="label-ar">كلمة المرور</span>
        </label>
        <input type="password" class="form-input" placeholder="Min. 8 caractères" id="password" required minlength="8" oninput="checkStrength(this.value)" />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>

      <div class="form-group">
        <label class="form-label">
          <span>Confirmer le mot de passe</span>
          <span class="label-ar">تأكيد كلمة المرور</span>
        </label>
        <input type="password" class="form-input" placeholder="••••••••" id="confirmPassword" required />
      </div>

      <div class="terms">
        <input type="checkbox" id="terms" required />
        <label for="terms">J'accepte les <a href="#">conditions d'utilisation</a> · أوافق على <a href="#">شروط الاستخدام</a></label>
      </div>

      <button type="submit" class="btn-submit">
        Créer mon compte · إنشاء الحساب
      </button>
    </form>

    <div class="divider">déjà inscrit ? · لديك حساب؟</div>
    <div class="signin-link">
      <a href="signin.html">Se connecter · تسجيل الدخول</a>
    </div>
  </div>

  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">🎊</div>
    <h2 style="font-size:1.8rem;margin-bottom:0.5rem;">Bienvenue !</h2>
    <p style="font-family:'Tajawal';font-size:1.4rem;color:var(--gold);">مرحباً بك في EDUMIND</p>
    <p style="color:var(--muted);margin-top:0.5rem;">Redirection vers votre tableau de bord...</p>
  </div>

  <script>
    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#ff5f6d','#ff9f43','#f5c842','#00c9a7'];
      fill.style.width = (score * 25) + '%';
      fill.style.background = colors[score-1] || '#ff5f6d';
    }

    async function handleSignup(e) {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (password !== confirm) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Les mots de passe ne correspondent pas · كلمتا المرور غير متطابقتين';
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          document.getElementById('successOverlay').classList.add('show');
          setTimeout(() => window.location.href = 'dashboard.html', 2000);
        } else {
          errorMsg.style.display = 'block';
          errorMsg.textContent = data.message || 'Erreur lors de l\'inscription';
        }
      } catch {
        // Demo mode
        document.getElementById('successOverlay').classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 2000);
      }
    }
  </script>
</body>
</html>
