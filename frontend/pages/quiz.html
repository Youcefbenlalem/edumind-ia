<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDUMIND IA — Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--emerald:#00c9a7;--emerald-dark:#008f76;--navy:#0a0e1a;--navy-light:#1a2340;--gold:#f5c842;--white:#f0f4ff;--muted:#8896b3;--purple:#a78bfa;--coral:#fb923c;--red:#f87171}
    body{font-family:'Syne','Tajawal',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
    .bg-canvas{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,201,167,.1) 0%,transparent 60%),var(--navy)}
    nav{position:sticky;top:0;z-index:100;padding:1rem 2rem;background:rgba(10,14,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,201,167,.1);display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:1.2rem;font-weight:800;color:var(--emerald);text-decoration:none;display:flex;align-items:center;gap:.4rem}
    .back-btn{color:var(--muted);text-decoration:none;font-size:.85rem;transition:color .2s}.back-btn:hover{color:var(--emerald)}
    main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem 6rem}

    /* INFO BAR */
    .info-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding:.8rem 1.2rem;background:rgba(26,35,64,.6);border:1px solid rgba(255,255,255,.06);border-radius:14px}
    .info-tag{font-size:.75rem;color:var(--muted);font-family:'Tajawal'}
    .info-score{font-size:1rem;font-weight:800;color:var(--gold)}
    .progress-bar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--emerald),var(--gold));border-radius:3px;transition:width .5s ease}

    /* LOADING */
    .loading{text-align:center;padding:4rem 2rem}
    .spinner{width:50px;height:50px;border:3px solid rgba(0,201,167,.2);border-top-color:var(--emerald);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:var(--emerald);font-weight:700;font-size:1.1rem;margin-bottom:.3rem}
    .loading-ar{font-family:'Tajawal';color:var(--muted);font-size:.95rem}

    /* QUESTION CARD */
    .question-card{background:rgba(26,35,64,.75);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:2rem;margin-bottom:1.2rem;backdrop-filter:blur(10px)}
    .q-num{font-size:.7rem;letter-spacing:2px;color:var(--emerald);font-weight:700;margin-bottom:.8rem}
    .q-text{font-size:1.05rem;font-weight:600;line-height:1.7;margin-bottom:1.5rem;font-family:'Tajawal';direction:rtl}
    .q-text.fr{font-family:'Syne';direction:ltr}
    .answers-grid{display:flex;flex-direction:column;gap:.7rem}
    .ans-btn{padding:1rem 1.2rem;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;text-align:right;color:var(--white);cursor:pointer;font-family:'Tajawal';font-size:.95rem;transition:all .25s;display:flex;align-items:center;gap:.8rem;direction:rtl}
    .ans-btn.fr{text-align:left;direction:ltr;font-family:'Syne';font-size:.9rem}
    .ans-btn:hover:not(:disabled){border-color:rgba(0,201,167,.4);background:rgba(0,201,167,.06)}
    .ans-btn.correct{border-color:#4ade80;background:rgba(74,222,128,.12);color:#4ade80}
    .ans-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
    .ans-letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;flex-shrink:0}

    /* EXPLICATION */
    .expl-box{display:none;margin-top:1.2rem;background:rgba(0,201,167,.06);border:1px solid rgba(0,201,167,.2);border-radius:12px;padding:1.2rem}
    .expl-box.show{display:block}
    .expl-title{font-size:.7rem;letter-spacing:2px;color:var(--emerald);font-weight:700;margin-bottom:.5rem}
    .expl-text{font-size:.9rem;color:var(--muted);line-height:1.7;font-family:'Tajawal';direction:rtl}
    .expl-text.fr{font-family:'Syne';direction:ltr}

    /* NEXT BTN */
    .btn-next{width:100%;padding:.9rem;background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.3);border-radius:12px;color:var(--emerald);cursor:pointer;font-family:'Syne';font-size:.95rem;font-weight:700;transition:all .25s;display:none;margin-top:1rem}
    .btn-next:hover{background:rgba(0,201,167,.2)}
    .btn-next.show{display:block}

    /* EXERCICE INTERACTIF */
    .ex-card{background:rgba(26,35,64,.75);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:2rem;margin-bottom:1.2rem;backdrop-filter:blur(10px)}
    .ex-titre{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:.8rem}
    .ex-enonce{font-size:.95rem;line-height:1.7;margin-bottom:1rem;font-family:'Tajawal';direction:rtl}
    .ex-donnees{background:rgba(0,201,167,.06);border:1px solid rgba(0,201,167,.2);border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.85rem;color:var(--emerald);font-family:'Tajawal';direction:rtl}
    .ex-questions{margin-bottom:1.2rem}
    .ex-q{padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.9rem;font-family:'Tajawal';direction:rtl}
    .student-area label{font-size:.75rem;letter-spacing:2px;color:var(--purple);font-weight:700;display:block;margin-bottom:.6rem}
    .student-area textarea{width:100%;min-height:120px;background:rgba(255,255,255,.04);border:1.5px solid rgba(167,139,250,.3);border-radius:12px;padding:.9rem;color:var(--white);font-family:'Tajawal';font-size:.9rem;resize:vertical;outline:none;line-height:1.6;direction:rtl}
    .student-area textarea:focus{border-color:var(--purple)}
    .btn-submit-answer{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--purple),#7c5fe6);border:none;border-radius:12px;color:white;font-family:'Tajawal';font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.8rem}
    .btn-submit-answer:disabled{opacity:.5;cursor:not-allowed}
    .eval-result{margin-top:1.2rem;display:none}
    .eval-result.show{display:block}
    .btn-next-ex{width:100%;padding:.9rem;background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.3);border-radius:12px;color:var(--emerald);cursor:pointer;font-family:'Tajawal';font-size:1rem;font-weight:700;transition:all .25s;margin-top:.8rem}
    .btn-next-ex:hover{background:rgba(0,201,167,.2)}

    /* RESULTS */
    .results-card{background:rgba(26,35,64,.85);border:1px solid rgba(0,201,167,.2);border-radius:24px;padding:2.5rem;text-align:center;display:none}
    .results-card.show{display:block}
    .res-emoji{font-size:4rem;margin-bottom:1rem}
    .res-score{font-size:3rem;font-weight:800;color:var(--emerald)}
    .res-msg{font-size:1rem;color:var(--white);margin:.5rem 0;font-weight:600}
    .res-ar{font-family:'Tajawal';direction:rtl;font-size:1rem;color:var(--muted)}
    .btn-retry{padding:.8rem 2rem;background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));border:none;border-radius:12px;color:white;cursor:pointer;font-family:'Syne';font-size:.95rem;font-weight:700;margin:.4rem;text-decoration:none;display:inline-block}
    .btn-home{padding:.8rem 2rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:var(--muted);cursor:pointer;font-family:'Syne';font-size:.95rem;text-decoration:none;display:inline-block;margin:.4rem}

    /* ERROR TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);border-radius:14px;padding:1rem 1.5rem;color:var(--red);font-size:.9rem;z-index:999;max-width:90%;text-align:center;backdrop-filter:blur(12px);transition:transform .3s}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="bg-canvas"></div>
<nav>
  <a href="dashboard.html" class="logo">🧠 EDUMIND<span style="color:var(--gold)">.</span>IA</a>
  <a href="quiz.html" class="back-btn">← Retour au choix</a>
</nav>

<main>
  <div class="info-bar">
    <div class="info-tag" id="infoTag">Chargement...</div>
    <div class="info-score" id="infoScore">0 pts</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- LOADING -->
  <div class="loading" id="loadingDiv">
    <div class="spinner"></div>
    <div class="loading-text">Génération par l'IA en cours...</div>
    <div class="loading-ar">جارٍ إنشاء الأسئلة بالذكاء الاصطناعي...</div>
  </div>

  <!-- QUIZ QCM -->
  <div id="quizContainer" style="display:none">
    <div id="questionContainer"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">السؤال التالي · Question suivante →</button>
  </div>

  <!-- EXERCICES MATH -->
  <div id="exerciceContainer" style="display:none"></div>

  <!-- RESULTS -->
  <div class="results-card" id="resultsCard">
    <div class="res-emoji" id="resEmoji">🏆</div>
    <div class="res-score" id="resScore">0/0</div>
    <div class="res-msg" id="resMsg"></div>
    <div class="res-ar" id="resAr"></div>
    <div style="margin-top:1.5rem">
      <a href="quiz.html" class="btn-retry">🔄 Refaire un quiz</a>
      <a href="dashboard.html" class="btn-home">🏠 Accueil</a>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API   = 'https://edumind-api.onrender.com';
const token = localStorage.getItem('token');

// Lire les paramètres URL
const params    = new URLSearchParams(location.search);
const annee     = params.get('annee')     || '';
const filiere   = params.get('filiere')   || '';
const matiere   = params.get('matiere')   || '';
const lecon     = params.get('lecon')     || '';
const difficulte= params.get('difficulte')|| 'normale';

// Langues dont les questions restent dans leur langue
const LANG_SUBJECTS = ['Francais','Anglais','Espagnol','Allemand'];
const isFrench  = matiere === 'Francais';
const isLang    = LANG_SUBJECTS.includes(matiere);

// Afficher infos
document.getElementById('infoTag').textContent =
  `${annee}${filiere?' · '+filiere:''} · ${matiere} · ${lecon.substring(0,30)}${lecon.length>30?'...':''}`;

// State quiz QCM
let questions   = [];
let current     = 0;
let score       = 0;

// State exercices
let exercices   = [];
let exCurrent   = 0;
let exTotal     = 0;
let exEarned    = 0;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 5000);
}

// ── GENERATE ──
async function generate() {
  if (!token) { location.href = 'signin.html'; return; }
  try {
    const res  = await fetch(`${API}/api/ia/quiz`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json','Authorization':'Bearer '+token },
      body: JSON.stringify({ annee, filiere, matiere, lecon, difficulte })
    });
    const data = await res.json();
    document.getElementById('loadingDiv').style.display = 'none';

    if (!res.ok) { showToast('❌ ' + (data.message || 'Erreur serveur')); return; }

    if (data.isMathPhys && data.exercices?.length) {
      exercices = data.exercices;
      exTotal   = exercices.reduce((s,e) => s+(e.bareme||5), 0);
      document.getElementById('exerciceContainer').style.display = 'block';
      renderExercice();
    } else if (data.questions?.length) {
      questions = data.questions;
      document.getElementById('quizContainer').style.display = 'block';
      renderQuestion();
    } else {
      showToast('❌ Réponse IA invalide — réessaie');
    }
  } catch(e) {
    document.getElementById('loadingDiv').style.display = 'none';
    showToast('❌ Impossible de contacter le serveur');
  }
}

// ── QCM ──
function renderQuestion() {
  const q     = questions[current];
  const total = questions.length;
  document.getElementById('progressFill').style.width = ((current/total)*100) + '%';
  document.getElementById('infoScore').textContent    = `${score}/${total} pts`;
  document.getElementById('btnNext').classList.remove('show');

  const letters = ['أ','ب','ج','د'];
  const isFr    = isLang;

  document.getElementById('questionContainer').innerHTML = `
    <div class="question-card">
      <div class="q-num">السؤال ${current+1} / ${total}</div>
      <div class="q-text ${isFr?'fr':''}">${q.question}</div>
      <div class="answers-grid">
        ${(q.options||[]).map((opt,i) => `
          <button class="ans-btn ${isFr?'fr':''}" onclick="selectAnswer(${i})" id="ans_${i}">
            <span class="ans-letter">${isFr?String.fromCharCode(65+i):letters[i]}</span>
            <span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="expl-box" id="explBox">
        <div class="expl-title">💡 الشرح · EXPLICATION</div>
        <div class="expl-text ${isFr?'fr':''}">${q.explication||q.explanation||''}</div>
      </div>
    </div>`;
}

function selectAnswer(idx) {
  const q = questions[current];
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
  const correct = Number(q.correct);
  document.getElementById(`ans_${idx}`).classList.add(idx === correct ? 'correct' : 'wrong');
  if (idx !== correct) document.getElementById(`ans_${correct}`).classList.add('correct');
  if (idx === correct) score++;
  document.getElementById('infoScore').textContent = `${score}/${questions.length} pts`;
  document.getElementById('explBox').classList.add('show');
  const btnNext = document.getElementById('btnNext');
  btnNext.classList.add('show');
  btnNext.textContent = current === questions.length-1
    ? '🏆 Voir les résultats · النتائج'
    : 'السؤال التالي · Question suivante →';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults(score, questions.length, false);
  } else {
    renderQuestion();
  }
}

// ── EXERCICES INTERACTIFS ──
function renderExercice() {
  const ex  = exercices[exCurrent];
  const tot = exercices.length;
  document.getElementById('progressFill').style.width = ((exCurrent/tot)*100) + '%';
  document.getElementById('infoScore').textContent    = `${exEarned}/${exTotal} pts`;

  document.getElementById('exerciceContainer').innerHTML = `
    <div class="ex-card">
      <div class="q-num">تمرين ${exCurrent+1} / ${tot}</div>
      <div class="ex-titre">📐 ${ex.titre||''}</div>
      <div class="ex-enonce">${(ex.enonce||'').replace(/\n/g,'<br>')}</div>
      ${ex.donnees?`<div class="ex-donnees">📊 المعطيات:<br>${ex.donnees.replace(/\n/g,'<br>')}</div>`:''}
      <div class="ex-questions">
        ${(ex.questions||[]).map(q=>`<div class="ex-q">${q}</div>`).join('')}
      </div>
      <div class="student-area">
        <label>✏️ إجابتك خطوة بخطوة · Ta réponse étape par étape</label>
        <textarea id="studentAnswer" placeholder="اكتب إجابتك هنا... Écris ta réponse ici..."></textarea>
        <button class="btn-submit-answer" id="btnSubmit" onclick="submitAnswer()">
          ✅ إرسال الإجابة · Soumettre
        </button>
      </div>
      <div class="eval-result" id="evalResult"></div>
    </div>`;
}

async function submitAnswer() {
  const answer = document.getElementById('studentAnswer').value.trim();
  if (!answer) { showToast('اكتب إجابتك أولاً · Écris ta réponse d\'abord !'); return; }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '⏳ جارٍ التصحيح... Correction en cours...';
  const ex = exercices[exCurrent];
  try {
    const res  = await fetch(`${API}/api/ia/evaluate`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ enonce:ex.enonce, donnees:ex.donnees||'', questions:ex.questions||[],
        correction:ex.correction, studentAnswer:answer, bareme:ex.bareme||5, matiere, annee })
    });
    const ev = await res.json();
    if (!res.ok) throw new Error(ev.message);
    const pts   = Number(ev.points_obtenus)||0;
    exEarned   += pts;
    document.getElementById('infoScore').textContent = `${exEarned}/${exTotal} pts`;
    const color = pts >= (ex.bareme*.7)?'var(--emerald)':pts >= (ex.bareme*.4)?'var(--gold)':'var(--coral)';
    const emoji = pts >= (ex.bareme*.7)?'🌟':pts >= (ex.bareme*.4)?'👍':'💪';
    const evalEl = document.getElementById('evalResult');
    evalEl.style.display = 'block';
    evalEl.classList.add('show');
    evalEl.innerHTML = `
      <div style="background:rgba(26,35,64,.9);border:1px solid ${color};border-radius:14px;padding:1.2rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:.8rem">
          <div style="font-weight:800;color:${color}">${emoji} ${ev.appreciation||'تم التصحيح'}</div>
          <div style="font-weight:800;color:${color};font-size:1.1rem">${pts}/${ex.bareme} pts</div>
        </div>
        ${ev.points_positifs?`<div style="margin-bottom:.7rem"><div style="font-size:.7rem;color:var(--emerald);font-weight:700;letter-spacing:1px;margin-bottom:.3rem">✅ ما أجدت فيه</div><div style="font-size:.85rem;color:var(--muted);font-family:Tajawal;direction:rtl">${ev.points_positifs}</div></div>`:''}
        <div style="margin-bottom:.7rem">
          <div style="font-size:.7rem;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:.3rem">📖 التصحيح التفصيلي</div>
          <div style="font-size:.85rem;color:var(--muted);line-height:1.7;font-family:Tajawal;direction:rtl">${(ev.correction_detaillee||'').replace(/\n/g,'<br>')}</div>
        </div>
        ${ev.points_ameliorer?`<div style="margin-bottom:.7rem"><div style="font-size:.7rem;color:var(--coral);font-weight:700;letter-spacing:1px;margin-bottom:.3rem">💡 ما يجب تحسينه</div><div style="font-size:.85rem;color:var(--muted);font-family:Tajawal;direction:rtl">${ev.points_ameliorer}</div></div>`:''}
        ${ev.encouragement?`<div style="font-size:.9rem;color:var(--purple);text-align:center;margin-top:.5rem;font-family:Tajawal">${ev.encouragement}</div>`:''}
        <button class="btn-next-ex" onclick="nextExercice()">
          ${exCurrent<exercices.length-1?'التمرين التالي · Exercice suivant →':'🏆 النتائج · Résultats'}
        </button>
      </div>`;
    btn.style.display = 'none';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✅ إرسال الإجابة · Soumettre';
    showToast('❌ ' + e.message);
  }
}

function nextExercice() {
  exCurrent++;
  if (exCurrent >= exercices.length) {
    showResults(exEarned, exTotal, true);
  } else {
    renderExercice();
  }
}

// ── RESULTS ──
function showResults(earned, total, isMath) {
  document.getElementById('quizContainer').style.display   = 'none';
  document.getElementById('exerciceContainer').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  const rc  = document.getElementById('resultsCard');
  rc.classList.add('show');
  const pct = total>0?Math.round((earned/total)*100):0;
  document.getElementById('resEmoji').textContent = pct>=70?'🏆':pct>=40?'👍':'💪';
  document.getElementById('resScore').textContent = `${earned}/${total}`;
  document.getElementById('resMsg').textContent   = pct>=70
    ? `Excellent ! ${pct}% — Tu maîtrises cette leçon !`
    : pct>=40
      ? `Bien ! ${pct}% — Continue à t'entraîner !`
      : `${pct}% — Ne te décourage pas, révise et réessaie !`;
  document.getElementById('resAr').textContent = pct>=70
    ? `ممتاز! ${pct}٪ — أنت تتقن هذا الدرس!`
    : pct>=40
      ? `أحسنت! ${pct}٪ — واصل التدريب!`
      : `${pct}٪ — لا تستسلم، راجع ثم حاول مجدداً!`;
  // Sauvegarder le score
  if (token) {
    fetch(`${API}/api/quiz/submit`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ score:earned, total, matiere, lecon, annee, filiere,
        isMath, points: isMath ? earned*2 : earned*10 })
    }).catch(()=>{});
  }
}

generate();
</script>
</body>
</html>
